<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VR 漢字間違い探し【003】土性、禄存・司禄の部屋。</title>
    <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="js/main.js"></script>
  </head>

  <body>
    <a-scene>
      <a-assets>
        <img id="sky" src="assets/sky.jpg" />

        <img id="tunnel" src="assets/tunnel.png" />
        <img id="tunnel-NRM" src="assets/tunnel-NRM.png" />
        <img id="tracks" src="assets/tracks37.png" />
        <img id="tracks-NRM" src="assets/tracks37-NRM.png" />

        <img id="shi" src="assets/stage/shi.png" />
        <img id="shi-NRM" src="assets/stage/shi-NRM.png" />
        <img id="zon" src="assets/stage/zon.png" />
        <img id="zon-NRM" src="assets/stage/zon-NRM.png" />
        <img id="sei" src="assets/stage/sei.png" />
        <img id="sei-NRM" src="assets/stage/sei-NRM.png" />
        <img id="roku" src="assets/stage/roku.png" />
        <img id="roku-NRM" src="assets/stage/roku-NRM.png" />

        <img id="q-1-1" src="assets/quiz/shi1.png" />
        <img id="q-1-1-NRM" src="assets/quiz/shi1-NRM.png" />
        <img id="q-1-2" src="assets/quiz/shi2.png" />
        <img id="q-1-2-NRM" src="assets/quiz/shi2-NRM.png" />
        <img id="q-1-3" src="assets/quiz/shi3.png" />
        <img id="q-1-3-NRM" src="assets/quiz/shi3-NRM.png" />

        <img id="q-2-1" src="assets/quiz/zon1.png" />
        <img id="q-2-1-NRM" src="assets/quiz/zon1-NRM.png" />
        <img id="q-2-2" src="assets/quiz/zon2.png" />
        <img id="q-2-2-NRM" src="assets/quiz/zon2-NRM.png" />
        <img id="q-2-3" src="assets/quiz/zon3.png" />
        <img id="q-2-3-NRM" src="assets/quiz/zon3-NRM.png" />

        <img id="q-3-1" src="assets/quiz/sei1.png" />
        <img id="q-3-1-NRM" src="assets/quiz/sei1-NRM.png" />
        <img id="q-3-2" src="assets/quiz/sei2.png" />
        <img id="q-3-2-NRM" src="assets/quiz/sei2-NRM.png" />
        <img id="q-3-3" src="assets/quiz/sei3.png" />
        <img id="q-3-3-NRM" src="assets/quiz/sei3-NRM.png" />

        <img id="q-4-1" src="assets/quiz/roku1.png" />
        <img id="q-4-1-NRM" src="assets/quiz/roku1-NRM.png" />
        <img id="q-4-2" src="assets/quiz/roku2.png" />
        <img id="q-4-2-NRM" src="assets/quiz/roku2-NRM.png" />
        <img id="q-4-3" src="assets/quiz/roku3.png" />
        <img id="q-4-3-NRM" src="assets/quiz/roku3-NRM.png" />

        <img id="correct" src="assets/correct.png" />
      </a-assets>

      <a-entity
        movement-controls="speed: 1; constrainToNavMesh: true"
        position="0 0 45"
      >
        <a-entity
          camera
          position="0 1.6 0"
          look-controls="pointerLockEnabled: true"
          move-check="raycaster:#move"
          quiz-check="raycaster:#quiz"
        >
          <a-text
            id="timer-text"
            color="#FF0000"
            align="center"
            position="0 1 -1.5"
            value="0"
          ></a-text>
          <a-entity
            id="move"
            rayOrigin="mouse"
            raycaster="objects: .gate; far: 0.15"
          ></a-entity>
          <a-cursor
            id="quiz"
            rayOrigin="mouse"
            raycaster="objects: .answer"
          ></a-cursor>
        </a-entity>
      </a-entity>

      <a-entity position=" 0 -0.1 0">
        <a-plane
          id="gate-1"
          color="#000"
          width="5"
          height="100"
          rotation="-90 0 0"
          position="0 0 0"
          nav-mesh
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate gate-end"
            data-stage="1"
            scale="10 10 0"
          ></a-plane>
        </a-plane>
        <a-plane
          id="stage-1"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="0 0 -95"
        ></a-plane>

        <a-plane
          id="gate-2"
          color="#000"
          width="5"
          height="100"
          rotation="-90 90 0"
          position="-95 0 -95"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -47 1"
            rotation="90 0 0"
            class="gate gate-start"
            data-stage="2"
            scale="10 10 0"
          ></a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate gate-end"
            data-stage="2"
            scale="10 10 0"
          ></a-plane>
        </a-plane>
        <a-plane
          id="stage-2"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="-190 0 -95"
        ></a-plane>

        <a-plane
          id="gate-3"
          color="#000"
          width="5"
          height="100"
          rotation="-90 0 0"
          position="-190 0 -190"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -47 1"
            rotation="90 0 0"
            class="gate gate-start"
            data-stage="3"
            scale="10 10 0"
          ></a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate gate-end"
            data-stage="3"
            scale="10 10 0"
          ></a-plane>
        </a-plane>
        <a-plane
          id="stage-3"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="-190 0 -285"
        ></a-plane>

        <a-plane
          id="gate-4"
          color="#000"
          width="5"
          height="100"
          rotation="-90 90 0"
          position="-95 0 -285"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 47 1"
            rotation="-90 0 0"
            class="gate gate-start"
            data-stage="4"
            scale="10 10 0"
          ></a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -49 1"
            rotation="-90 0 0"
            class="gate gate-end"
            data-stage="4"
            scale="10 10 0"
          ></a-plane>
        </a-plane>
        <a-plane
          id="stage-4"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="0 0 -285"
        ></a-plane>

        <a-plane
          id="gate-5"
          color="#000"
          width="5"
          height="100"
          rotation="-90 0 0"
          position="0 0 -380"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -47 1"
            rotation="90 0 0"
            class="gate gate-start"
            data-stage="5"
            scale="10 10 0"
          ></a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate gate-end"
            data-stage="5"
            scale="10 10 0"
          ></a-plane>
        </a-plane>
      </a-entity>

      <a-entity position="0 0 0" rotation="0 0 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width="5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          ></a-plane>
        </a-plane>
        <a-cylinder
          id="tunnel-1"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
        ></a-cylinder>
        <a-box
          id="box-1"
          class="box-stage"
          data-stage="1"
          material="src: #shi; repeat: -10, 10; normalMap: #shi-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        ></a-box>
      </a-entity>

      <a-entity position="-95 0 -95" rotation="0 90 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width="5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          ></a-plane>
        </a-plane>
        <a-cylinder
          id="tunnel-2"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
        <a-box
          id="box-2"
          class="box-stage"
          data-stage="2"
          material="src: #zon; repeat: -10, 10; normalMap: #zon-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        ></a-box>
      </a-entity>

      <a-entity position="-190 0 -190" rotation="0 0 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width="5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          ></a-plane>
        </a-plane>
        <a-cylinder
          id="tunnel-3"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
        <a-box
          id="box-3"
          class="box-stage"
          data-stage="3"
          material="src: #sei; repeat: -10, 10; normalMap: #sei-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        ></a-box>
      </a-entity>

      <a-entity position="-95 0 -285" rotation="0 270 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width="5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          ></a-plane>
        </a-plane>
        <a-cylinder
          id="tunnel-4"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
        <a-box
          id="box-4"
          class="box-stage"
          data-stage="4"
          material="src: #roku; repeat: -10, 10; normalMap: #roku-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        ></a-box>
      </a-entity>

      <a-entity position="0 0 -380" rotation="0 0 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width="5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          ></a-plane>
        </a-plane>
        <a-cylinder
          id="tunnel-5"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
      </a-entity>

      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
